services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nest_launchpad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - nest_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nest_launchpad"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  nest_postgres:
