services:
  - type: web
    name: nest-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nest-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: NEST_SESSION_SECRET
        generateValue: true

databases:
  - name: nest-postgres
    databaseName: nest_launchpad
    plan: basic-256mb
