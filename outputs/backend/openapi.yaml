openapi: 3.1.0
info:
  title: Nest API
  version: 1.1.0
  description: Backend contract for the Nest NFT launchpad.
servers:
  - url: https://api.nest.example/v1
  - url: http://127.0.0.1:8787/v1
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
        details: { type: object }
        errorId: { type: string, description: Correlation id for 4xx/5xx logs }
    CollectionInput:
      type: object
      required: [name, symbol, description, chainId, chainName, mintCurrency, mintPriceWei, maxSupply, maxPerWallet, royaltyBps, creatorPayoutWallet]
      properties:
        name: { type: string, maxLength: 100, description: Plain text only; HTML/control characters rejected }
        symbol: { type: string, maxLength: 12, pattern: '^[A-Za-z0-9._-]+$' }
        description: { type: string, maxLength: 5000, description: Plain text only; HTML rejected }
        chainId: { type: integer, enum: [46630, 4663] }
        chainName: { type: string, enum: [Robinhood Chain Testnet, Robinhood Chain] }
        mintCurrency: { type: string, const: ETH }
        mintPriceWei: { type: string, pattern: '^\\d+$' }
        maxSupply: { type: integer, minimum: 1, maximum: 10000 }
        maxPerWallet: { type: integer, minimum: 1, description: Must be <= maxSupply }
        maxPerTransaction: { type: integer, minimum: 1, description: Must be <= maxPerWallet and <= maxSupply }
        royaltyBps: { type: integer, minimum: 0, maximum: 1000, description: Secondary royalty signal cap 10% }
        creatorPayoutWallet: { type: string }
        websiteUrl: { type: string, format: uri }
        socialUrl: { type: string, format: uri }
        mintStartAt: { type: string, format: date-time }
        mintEndAt: { type: string, format: date-time }
paths:
  /health:
    get:
      summary: Live health probes (db, pinata, rpcs, factory bytecode presence)
      responses:
        '200': { description: Healthy or degraded with integration flags }
        '503': { description: Database unavailable }
  /health/storage:
    get:
      summary: Verify server-side IPFS provider authentication
      responses:
        '200': { description: Storage provider authenticated }
        '503': { description: Storage provider missing or authentication failed }
  /auth/nonce:
    post:
      summary: Create a wallet sign-in challenge
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [walletAddress], properties: { walletAddress: { type: string } } } } }
      responses: { '200': { description: Message to sign } }
  /auth/verify:
    post:
      summary: Verify signature; sets httpOnly nest_session cookie and returns in-memory JWT
      responses: { '200': { description: Authenticated } }
  /auth/me:
    get:
      security: [{ bearerAuth: [] }]
      summary: Return wallet for cookie or bearer session
      responses: { '200': { description: Session valid }, '401': { description: Unauthorized } }
  /auth/logout:
    post:
      summary: Clear httpOnly session cookie
      responses: { '200': { description: Logged out } }
  /collections:
    get:
      summary: List public collections
      responses: { '200': { description: Paginated collections } }
    post:
      security: [{ bearerAuth: [] }]
      summary: Create collection draft
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CollectionInput' } } }
      responses: { '201': { description: Created }, '400': { description: Invalid input } }
  /collections/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      summary: Get public collection
      responses: { '200': { description: Collection }, '404': { description: Missing } }
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update creator-owned draft
      responses: { '200': { description: Updated }, '403': { description: Not owner } }
  /collections/{id}/activity:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      summary: List confirmed mint activity
      responses: { '200': { description: Confirmed mint records } }
  /collections/{id}/revenue:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      summary: Read onchain creator and platform accrued balances
      responses: { '200': { description: Pull-payment revenue state }, '404': { description: Collection not live } }
  /collections/{id}/revenue/prepare:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post:
      security: [{ bearerAuth: [] }]
      summary: Prepare creator or platform withdrawal transaction
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [recipient], properties: { recipient: { type: string, enum: [creator, platform] } } } } }
      responses: { '200': { description: Unsigned fixed-recipient withdrawal transaction }, '403': { description: Wallet not authorized } }
  /collections/{id}/revenue/record:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post:
      security: [{ bearerAuth: [] }]
      summary: Record a submitted revenue withdrawal
      responses: { '201': { description: Pending withdrawal record }, '403': { description: Wallet not authorized } }
  /revenue/confirm:
    post:
      security: [{ bearerAuth: [] }]
      summary: Verify fixed-recipient withdrawal receipt and event
      responses: { '200': { description: Settled withdrawal }, '409': { description: Receipt or event mismatch } }
  /storage/artwork:
    post:
      security: [{ bearerAuth: [] }]
      summary: Upload creator-owned collection artwork to IPFS
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [collectionId, file]
              properties:
                collectionId: { type: string }
                file: { type: array, items: { type: string, format: binary } }
      responses: { '201': { description: Pinned artwork assets }, '403': { description: Not collection owner }, '415': { description: Unsupported media } }
  /storage/metadata:
    post:
      security: [{ bearerAuth: [] }]
      summary: Generate and pin collection metadata JSON
      responses: { '201': { description: Pinned metadata records }, '403': { description: Not collection owner } }
  /deployments/prepare:
    post:
      security: [{ bearerAuth: [] }]
      summary: Simulate and return unsigned factory transaction
      responses: { '200': { description: Unsigned transaction request } }
  /deployments/record:
    post:
      security: [{ bearerAuth: [] }]
      summary: Record creator-signed deployment transaction
      responses: { '200': { description: Pending deployment } }
  /deployments/confirm:
    post:
      security: [{ bearerAuth: [] }]
      summary: Verify deployment receipt and CollectionCreated event
      responses: { '200': { description: Confirmed deployment } }
  /mints/record:
    post:
      security: [{ bearerAuth: [] }]
      summary: Record user-signed mint transaction for indexing
      responses: { '201': { description: Pending mint } }
  /mints/confirm:
    post:
      security: [{ bearerAuth: [] }]
      summary: Verify mint receipt, payment, events, and token ownership
      responses: { '200': { description: Confirmed mint and token IDs } }
  /dashboard/creator:
    get:
      security: [{ bearerAuth: [] }]
      summary: Creator collections and aggregate metrics
      responses: { '200': { description: Dashboard data } }
